name: Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please read our [Contribute guide](https://www.reactiveui.net/contribute/index.html) before opening an issue. Although we can't commit to a timeline, priority is given to [Contributors](https://www.reactiveui.net/contribute/index.html) to the project.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before opening an issue.
      options:
        - label: I have searched [open](https://github.com/reactiveui/ReactiveUI/issues) and [closed](https://github.com/reactiveui/ReactiveUI/issues?q=is%3Aissue+is%3Aclosed) issues for duplicates.
          required: true
        - label: I am using the latest stable release.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug 🐞
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: input
    id: reproduce-repository
    attributes:
      label: Reproduction repository
      description: A minimal repository that reproduces the bug.
      placeholder: https://github.com/your-username/repro
    validations:
      required: false
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots 🖼️
      description: If applicable, add screenshots or recordings to help explain your problem.
    validations:
      required: false
  - type: dropdown
    id: ide
    attributes:
      label: IDE
      multiple: true
      options:
        - Visual Studio 2026
        - Visual Studio 2022
        - JetBrains Rider
        - Visual Studio Code
        - Cursor
        - Other
  - type: dropdown
    id: dotnet-version
    attributes:
      label: .NET version
      multiple: true
      options:
        - .NET 10
        - .NET 9
        - .NET Framework 4.8.1
        - .NET Framework 4.8
        - Other
    validations:
      required: true
  - type: input
    id: target-framework
    attributes:
      label: Target framework(s)
      description: e.g. net10.0, net10.0-windows, net10.0-android, net9.0
    validations:
      required: false
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      description: Windows, Linux, macOS, Android, iOS, ...
    validations:
      required: false
  - type: input
    id: system-version
    attributes:
      label: OS version
      description: Version and distribution (if applicable)
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device
      description: e.g. iPhone 17, Pixel 10
    validations:
      required: false
  - type: input
    id: reactiveui-version
    attributes:
      label: ReactiveUI version
      description: e.g. 23.2.19
    validations:
      required: true
  - type: textarea
    id: additional-information
    attributes:
      label: Additional information ℹ️
      description: Any other context about the problem.
    validations:
      required: false
