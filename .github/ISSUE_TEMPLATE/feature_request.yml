name: Feature request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Please read our [Contribute guide](https://www.reactiveui.net/contribute/index.html) before opening a feature request. Although we can't commit to a timeline, priority is given to [Contributors](https://www.reactiveui.net/contribute/index.html). For general questions, please use [GitHub Discussions](https://github.com/reactiveui/ReactiveUI/discussions).
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: implementation
    attributes:
      label: Suggestions on how to achieve the feature
      description: A clear description of how the feature could be implemented.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context or screenshots about the feature request.
    validations:
      required: false
